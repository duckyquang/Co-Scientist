name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Gate the deploy on a green suite: `deploy` needs `build`, so a failed
      # lint or test here blocks publishing to Pages.
      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run unit tests
        run: pytest co_scientist/tests/unit -q

      - name: Export static demo data
        run: python scripts/export_static_demo.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          VITE_STATIC_DEMO: "true"
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Baked-in Groq key → the live site reads each visitor's prompt with a
          # real model. Add a FREE, rotatable Groq key as the GROQ_API_KEY repo
          # secret. If unset, the site runs the clearly-labeled prompt-aware
          # in-browser simulation (still on-topic, just no live reasoning).
          VITE_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional keyless-style provider (needs a registered Pollinations token).
          VITE_POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
          VITE_README_LOCAL_URL: https://github.com/duckyquang/Co-Scientist#option-1-run-locally
        run: npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
