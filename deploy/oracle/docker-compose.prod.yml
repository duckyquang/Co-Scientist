# Production overlay for Oracle Cloud (or any VPS).
# Usage: docker compose -f docker-compose.yml -f deploy/oracle/docker-compose.prod.yml up -d --build
services:
  co-scientist:
    ports: []  # only reachable via Caddy on the internal network
    env_file:
      - deploy/oracle/.env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://duckyquang.github.io,http://localhost:5173}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in deploy/oracle/.env}
    volumes:
      - ./deploy/oracle/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      co-scientist:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
